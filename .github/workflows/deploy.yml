name: Deploy BatchFX

on:
  push:
    branches: [ "main" ]   # push 到 main 自动触发
  workflow_dispatch:        # 也支持手动点运行

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-batchfx
      cancel-in-progress: false

    steps:
    - name: Deploy over SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host:     ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key:      ${{ secrets.VPS_SSH_KEY }}
        port:     ${{ secrets.VPS_PORT }}
        envs: GITHUB_SHA,GITHUB_ACTOR,GITHUB_REF_NAME,GITHUB_RUN_NUMBER
        script: |
          export GITHUB_SHA=${GITHUB_SHA:-}
          export GITHUB_ACTOR=${GITHUB_ACTOR:-}
          export GITHUB_REF_NAME=${GITHUB_REF_NAME:-}
          export GITHUB_RUN_NUMBER=${GITHUB_RUN_NUMBER:-}
          /usr/local/bin/deploy-batchfx.sh main


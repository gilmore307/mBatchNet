{% extends "base.html" %}
{% block body %}
<h2>Running Job</h2>
<p class="text-muted">The server is executing this step in the background.</p>
<div class="card">
  <div class="card-body">
    <p><strong>Job:</strong> {{ job.kind }}</p>
    <p><strong>Status:</strong> <span id="job-status" class="badge text-bg-info">{{ job.status }}</span></p>
    <p><strong>Session:</strong> {{ job.session_id }}</p>
    <div class="progress mb-3">
      <div id="job-progress" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="/sessions/{{ job.session_id }}/logs">View log</a>
    <a id="results-link" class="btn btn-success btn-sm {% if job.status == 'running' %}disabled{% endif %}" href="{{ next_url }}">Continue</a>
  </div>
</div>
<script>
const jobId = "{{ job.id }}";
async function pollJob() {
  const res = await fetch(`/jobs/${jobId}.json`);
  const data = await res.json();
  const badge = document.getElementById("job-status");
  badge.textContent = data.status;
  badge.className = `badge text-bg-${data.status === "success" ? "success" : data.status === "failed" ? "danger" : "info"}`;
  if (data.status !== "running") {
    document.getElementById("job-progress").classList.remove("progress-bar-animated");
    document.getElementById("results-link").classList.remove("disabled");
    return;
  }
  setTimeout(pollJob, 1500);
}
setTimeout(pollJob, 1200);
</script>
{% endblock %}

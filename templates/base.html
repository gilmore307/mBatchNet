<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}mBatchNet{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/assets/ui.css">
    <link rel="stylesheet" href="/assets/server.css">
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary sticky-top mb-4 be-navbar">
      <div class="container-fluid d-flex flex-column py-1">
        <div class="d-flex align-items-center flex-wrap justify-content-between w-100 py-1 px-3">
          <div class="d-flex align-items-center flex-wrap">
            <a class="btn btn-outline-light btn-sm mb-2 me-2 be-nav-fixed" href="/"><i class="bi bi-house me-1"></i>Home</a>
            <a class="btn btn-outline-light btn-sm mb-2 me-2 be-nav-fixed" href="https://github.com/gilmore307/Batch-Effect-Correction" target="_blank"><i class="bi bi-github me-1"></i>GitHub</a>
            <a class="btn btn-outline-light btn-sm mb-2 me-2 be-nav-fixed" href="https://github.com/gilmore307/Batch-Effect-Correction/issues" target="_blank"><i class="bi bi-bug me-1"></i>Report issue</a>
          </div>
          <div class="d-flex align-items-center flex-wrap ms-auto">
            <a class="btn btn-outline-light btn-sm mb-2 ms-2 be-nav-fixed" href="/help"><i class="bi bi-question-circle me-1"></i>Help</a>
            {% if session_id %}
              <a class="btn btn-outline-light btn-sm mb-2 ms-2 be-nav-fixed" href="/sessions/{{ session_id }}/logs"><i class="bi bi-terminal me-1"></i>Logs</a>
              <a class="btn btn-outline-light btn-sm mb-2 ms-2 be-nav-fixed" href="/sessions/{{ session_id }}/download/output"><i class="bi bi-download me-1"></i>Download results</a>
            {% else %}
              <span class="btn btn-outline-light btn-sm mb-2 ms-2 be-nav-fixed disabled"><i class="bi bi-terminal me-1"></i>Logs</span>
              <span class="btn btn-outline-light btn-sm mb-2 ms-2 be-nav-fixed disabled"><i class="bi bi-download me-1"></i>Download results</span>
            {% endif %}
            {% block nav_actions %}{% endblock %}
          </div>
        </div>
        <div class="be-pipeline-container d-flex align-items-stretch flex-nowrap w-100 py-1">
          <a class="btn btn-sm be-pipeline-step text-truncate {{ 'btn-light' if active_path == '/upload' else 'btn-outline-light' }}" href="/upload">Upload Files</a>
          <a class="btn btn-sm be-pipeline-step text-truncate {{ 'btn-light' if active_path == '/pre' else 'btn-outline-light' }}" href="{{ '/sessions/' ~ session_id ~ '/pre' if session_id else '/pre' }}">Pre-correction Assessment</a>
          <a class="btn btn-sm be-pipeline-step text-truncate {{ 'btn-light' if active_path == '/correction' else 'btn-outline-light' }}" href="{{ '/sessions/' ~ session_id ~ '/correction' if session_id else '/correction' }}">Batch Effect Correction</a>
          <a class="btn btn-sm be-pipeline-step text-truncate {{ 'btn-light' if active_path == '/post' else 'btn-outline-light' }}" href="{{ '/sessions/' ~ session_id ~ '/post' if session_id else '/post' }}">Post-correction Assessment</a>
        </div>
      </div>
    </nav>
    <main class="container-fluid be-page-shell">
      {% block body %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

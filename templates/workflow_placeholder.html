{% extends "base.html" %}
{% block title %}{{ title }} · mBatchNet{% endblock %}
{% block body %}
<div class="row mb-4">
  <div class="col-12">
    <h2 class="fw-bold be-section-title">{{ title }}</h2>
    <p class="text-muted mb-0">{{ description }}</p>
  </div>
</div>
<div class="card be-content-card">
  <div class="card-body">
    <p class="mb-3">This workflow step becomes available after upload and preprocessing create a session-specific workspace.</p>
    <a class="btn btn-success btn-sm be-wide-button" href="/upload">Go to Upload Files</a>
  </div>
</div>
{% endblock %}
